name: Backend deploy

# Only the main app stack (terraform/, excluding terraform/bootstrap) and the
# Lambda source are in scope here. terraform/bootstrap is applied by hand,
# not by this workflow — see terraform/bootstrap/main.tf for why.
on:
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - "terraform/**"
      - "!terraform/bootstrap/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required to fetch the OIDC token from GitHub
  contents: read

jobs:
  test:
    name: Run Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        working-directory: lambda
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: lambda
        run: python -m pytest tests/ -v

  deploy:
    name: Terraform plan & apply
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TEMPORARY — diagnosing an OIDC AssumeRoleWithWebIdentity AccessDenied
      # where both the role's trust policy and the workflow's inputs check
      # out correct on paper. Prints the actual JWT claims GitHub issues so
      # they can be compared byte-for-byte against the trust policy's
      # conditions, instead of guessing further. Remove once resolved.
      - name: DEBUG - decode OIDC token claims
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r .value)
          python3 -c "import base64,json,sys; t=sys.argv[1].split('.')[1]; t+='='*(-len(t)%4); print(json.dumps(json.loads(base64.urlsafe_b64decode(t)),indent=2))" "$TOKEN"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
